<section class="result-question">
  <span>{{ question.question_text }}</span>
  @for (answer of question.answers; track answer.id; let i = $index) {
    <div class="option">
      <span class="#">{{ getLabel(i) }}</span>
      <div class="bar">
        <div class="bar__inner"></div>
      </div>
      <span class="%">27%</span>
    </div>
  }
</section>
